name: CI - dbt Validation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  dbt-validation:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dbt/instacart_market_basket

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dbt
      run: pip install dbt-postgres

    - name: Validate dbt installation
      run: dbt --version

    - name: Run dbt deps
      run: dbt deps

    - name: Run dbt parse
      run: dbt parse --profiles-dir .

    - name: Run dbt compile
      run: dbt compile --profiles-dir .